services:
  web:
    build: .
    image: docker-mastery-hello-web:local
    ports:
      - "8080:8080"
    environment:
      APP_MESSAGE: "Docker mastery lab"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2)"]
      interval: 30s
      timeout: 3s
      retries: 3