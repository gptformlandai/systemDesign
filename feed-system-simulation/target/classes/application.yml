spring:
  application:
    name: feed-system-simulation
  profiles:
    active: kafka

  # R2DBC H2 Database Configuration
  r2dbc:
    url: r2dbc:h2:mem:///feed_sim_db;DB_CLOSE_DELAY=-1
    username: sa
    password:

  # Initialize DB Schema from schema.sql
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

  # Kafka Configuration (Disabled by default, enabled under 'kafka' profile)
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: feed-fanout-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.systemdesign.feed.model"

logging:
  level:
    root: INFO
    org.springframework.r2dbc: INFO
    com.systemdesign.feed: DEBUG
