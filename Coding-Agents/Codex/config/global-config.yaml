## Full Config With All Options

```yaml
# ~/.codex/config.yaml

# Primary model for most tasks
model: o4-mini

# Default approval policy
approval_policy: auto-edit

# Optional: notification on long task completion
# notify: true

# Optional: disable telemetry
# disable_telemetry: true
```

---

## Environment Variables (Required)

```bash
# Required — must be set before codex will work
export OPENAI_API_KEY="sk-..."

# Add to shell profile for persistence
echo 'export OPENAI_API_KEY="sk-..."' >> ~/.zshrc  # or ~/.bashrc

# NEVER commit this value to any file
# NEVER put this value in AGENTS.md
# NEVER put this value in a Codex prompt
```

---

## Per-Project Config Override

```bash
# To override config for a specific project without changing global config:
# Run from project root:

codex --model gpt-4.1 --approval-policy auto-edit "task"

# Or set a project-level wrapper in your Makefile:
# codex-default:
#     @codex --model gpt-4.1 --approval-policy auto-edit "$(TASK)"
```
