# PR Quality Gate — GitHub Actions Template
# Use: copy to .github/workflows/pr-quality-gate.yml
# Runs on every PR — blocks merge if any check fails

name: PR Quality Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Conventional Commit Check ──────────────────────────────────────────────
  commit-lint:
    name: Commit Message Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check conventional commit format
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.json
        # Create .commitlintrc.json with: {"extends": ["@commitlint/config-conventional"]}

  # ─── Secret Scanning ────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── PR Size Check ──────────────────────────────────────────────────────────
  pr-size:
    name: PR Size Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check PR size
        uses: CodelyTV/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_max_size: 10
          s_max_size: 50
          m_max_size: 200
          l_max_size: 500
          fail_if_xl: false  # set to true to block XL PRs

  # ─── Auto-label by changed files ────────────────────────────────────────────
  label:
    name: Auto-Label PR
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Auto-label by changed paths
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
        # Requires .github/labeler.yml with path patterns per label

  # ─── Post PR Summary Comment ────────────────────────────────────────────────
  pr-summary:
    name: Post Quality Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [commit-lint, secret-scan]
    if: always()

    permissions:
      pull-requests: write

    steps:
      - name: Post quality check summary
        uses: actions/github-script@v7
        with:
          script: |
            const checks = {
              'Commit Lint': '${{ needs.commit-lint.result }}',
              'Secret Scan': '${{ needs.secret-scan.result }}'
            };
            
            const rows = Object.entries(checks).map(([name, result]) => {
              const icon = result === 'success' ? '✅' : result === 'skipped' ? '⏭️' : '❌';
              return `| ${icon} | ${name} | ${result} |`;
            });
            
            const body = `## PR Quality Gate Results\n\n| | Check | Status |\n|---|---|---|\n${rows.join('\n')}`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
