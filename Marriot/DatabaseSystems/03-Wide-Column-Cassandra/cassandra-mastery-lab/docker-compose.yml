services:
  cassandra:
    image: cassandra:5
    container_name: cassandra-mastery-lab
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: CassandraMasteryLab
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      MAX_HEAP_SIZE: 1G
      HEAP_NEWSIZE: 256M
    volumes:
      - cassandra-data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES' 127.0.0.1 9042 >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 20

volumes:
  cassandra-data: