services:
  neo4j:
    image: neo4j:5.22-community
    container_name: neo4j-mastery-lab
    environment:
      NEO4J_AUTH: none
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -a bolt://localhost:7687 'RETURN 1' >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 20

volumes:
  neo4j-data:
  neo4j-logs: